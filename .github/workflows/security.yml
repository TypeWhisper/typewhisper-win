name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '23 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/dependency-review-action@v5

  dotnet-package-audit:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Ensure NuGet global packages folder
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path (Join-Path $env:USERPROFILE '.nuget\packages') | Out-Null

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: |
            **/*.csproj
            Directory.Build.props

      - name: Create artifact directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path artifacts/security | Out-Null

      - name: Audit NuGet dependencies
        shell: pwsh
        run: |
          $failed = $false

          foreach ($project in Get-ChildItem src, tests, plugins -Recurse -Filter *.csproj | Sort-Object FullName) {
            $safeName = ($project.FullName.Replace($env:GITHUB_WORKSPACE, '').TrimStart('\') -replace '[\\/:*?"<>| ]', '_')

            Write-Host "Auditing $($project.FullName)"
            $reportJson = & dotnet list $project.FullName package --vulnerable --include-transitive --format json

            if ($LASTEXITCODE -ne 0) {
              throw "dotnet list package failed: $($project.FullName)"
            }

            $reportJson | Set-Content "artifacts/security/$safeName.json"
            $report = $reportJson | ConvertFrom-Json -Depth 100
            $projectHasVulnerabilities = $false

            foreach ($projectReport in @($report.projects | Where-Object { $null -ne $_ })) {
              foreach ($framework in @($projectReport.frameworks | Where-Object { $null -ne $_ })) {
                $topLevelPackages = @($framework.topLevelPackages | Where-Object { $null -ne $_ })
                $transitivePackages = @($framework.transitivePackages | Where-Object { $null -ne $_ })

                if ($topLevelPackages.Count -gt 0 -or $transitivePackages.Count -gt 0) {
                  $projectHasVulnerabilities = $true
                }
              }
            }

            if ($projectHasVulnerabilities) {
              Write-Warning "Vulnerable packages detected in $($project.FullName)"
              $failed = $true
            }
          }

          if ($failed) {
            throw "One or more .NET projects have vulnerable packages."
          }

      - name: Compress NuGet audit reports
        if: always()
        shell: pwsh
        run: |
          $reports = @(Get-ChildItem artifacts/security -Filter *.json -File -ErrorAction SilentlyContinue)
          if ($reports.Count -eq 0) {
            Write-Host "No NuGet audit reports to archive."
            return
          }

          Compress-Archive -Path $reports.FullName -DestinationPath artifacts/security/dotnet-package-audit.zip -Force

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: dotnet-package-audit
          path: artifacts/security/dotnet-package-audit.zip
          if-no-files-found: ignore

  python-package-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Check Python requirements file
        id: requirements
        shell: bash
        run: |
          if [[ -f plugins/TypeWhisper.Plugin.GraniteSpeech/Scripts/requirements.txt ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v6
        if: steps.requirements.outputs.exists == 'true'
        with:
          python-version: '3.12'

      - name: Install pip-audit
        if: steps.requirements.outputs.exists == 'true'
        run: python -m pip install --upgrade pip pip-audit

      - name: No Python dependencies to audit
        if: steps.requirements.outputs.exists != 'true'
        run: echo "No Granite Speech requirements.txt found. Skipping Python dependency audit."

      - name: Audit Python dependencies
        if: steps.requirements.outputs.exists == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/security
          # These torch/transformers advisories currently have no fixed versions
          # in the vulnerability feed; keep the audit active for all other IDs.
          ignored_vulns=(
            PYSEC-2025-189
            PYSEC-2025-190
            PYSEC-2025-191
            PYSEC-2025-192
            PYSEC-2025-193
            PYSEC-2025-194
            PYSEC-2025-195
            PYSEC-2025-196
            PYSEC-2025-197
            PYSEC-2025-210
            PYSEC-2025-211
            PYSEC-2025-212
            PYSEC-2025-213
            PYSEC-2025-214
            PYSEC-2025-215
            PYSEC-2025-216
            PYSEC-2025-217
            PYSEC-2025-218
            PYSEC-2026-139
          )
          for vuln in "${ignored_vulns[@]}"; do
            fixed_versions="$(curl -fsS "https://api.osv.dev/v1/vulns/${vuln}" | jq -r '[.affected[]?.ranges[]?.events[]?|select(has("fixed"))|.fixed] | unique | join(",")')"
            if [[ -n "${fixed_versions}" ]]; then
              echo "Ignored advisory ${vuln} now has fix(es): ${fixed_versions}. Remove it from ignored_vulns."
              exit 1
            fi
          done
          ignore_args=()
          for vuln in "${ignored_vulns[@]}"; do
            ignore_args+=(--ignore-vuln "$vuln")
          done
          pip-audit -r plugins/TypeWhisper.Plugin.GraniteSpeech/Scripts/requirements.txt --progress-spinner off "${ignore_args[@]}" | tee artifacts/security/granite-speech-pip-audit.txt

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: python-package-audit
          path: artifacts/security/*.txt
          if-no-files-found: ignore
