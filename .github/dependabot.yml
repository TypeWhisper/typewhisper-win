version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "nuget"
    directories:
      - "/src/*"
      - "/tests/*"
      - "/plugins/*"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
